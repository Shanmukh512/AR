<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- Gesture Controls -->
  <script src="https://cdn.jsdelivr.net/gh/fcor/arjs-gestures/gesture-detector.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/fcor/arjs-gestures/gesture-handler.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>

<body>

<a-scene
  vr-mode-ui="enabled: true"
  embedded
  gesture-detector
  webxr="optionalFeatures: hit-test;"
  renderer="logarithmicDepthBuffer: true;"
>

  <a-assets>
    <!-- Assets -->
    <img id="photo" src="https://plus.unsplash.com/premium_photo-1700353612860-bd8ab8d71f05?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
    <video id="inviteVideo" src="Your paragraph text.mp4" loop="true" crossorigin="anonymous"></video>
    <audio id="bgmusic" src="Lights(chosic.com).mp3"></audio>
    <a-asset-item id="ringModel" src="ring.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 1.6 0"></a-camera>

  <!-- Main Invitation Container -->
  <a-entity
      id="invitation"
      position="0 0 -2"
      scale="0.6 0.6 0.6"
      gesture-handler
  >

      <!-- 3D Ring -->
      <a-entity
          gltf-model="#ringModel"
          position="0 2 0"
          scale="0.4 0.4 0.4"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
      </a-entity>

      <!-- Names -->
      <a-text 
          value="Shannu ❤️ Priya"
          align="center"
          color="gold"
          position="0 1.2 0"
          width="4">
      </a-text>

      <!-- Couple Image -->
      <a-plane
          src="#photo"
          position="0 0.2 0"
          width="2"
          height="1.5">
      </a-plane>

      <!-- Invitation Video -->
      <a-video
          src="#inviteVideo"
          position="0 -1.2 0"
          width="2.5"
          height="1.4">
      </a-video>

  </a-entity>

</a-scene>

<script>
  // Start music & video after first user tap
  document.body.addEventListener('click', function () {
    const video = document.querySelector('#inviteVideo');
    const music = document.querySelector('#bgmusic');
    video.play();
    music.play();
  }, { once: true });
</script>

</body>
</html>

  </a-scene>
</body>

</html>
